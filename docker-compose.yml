version: '3.8'
services:
  commandarr:
    build: .
    container_name: commandarr
    restart: unless-stopped
    ports:
      - "${PORT:-8484}:${PORT:-8484}"
    volumes:
      - ./data:/app/data
      - ./integrations:/app/custom-integrations
    environment:
      - PORT=${PORT:-8484}
      - HOST=0.0.0.0
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-commandarr-change-this-key}
